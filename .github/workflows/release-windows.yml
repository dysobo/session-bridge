name: Release Windows

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag
        required: true
        default: v1.0.0

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Get packages
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build Windows
        run: flutter build windows --release

      - name: Package Windows build
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath dist\session-bridge-windows-x64.zip -Force

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          files: dist/session-bridge-windows-x64.zip
